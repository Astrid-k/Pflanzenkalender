<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schnittkalender</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #2d4a2d;
    --green-mid: #4a7c4a;
    --green-light: #7aab5e;
    --cream: #f5f0e8;
    --warm-white: #faf8f3;
    --terra: #c4703a;
    --bloom: #d4845a;
    --text-dark: #1e2e1e;
    --text-mid: #4a5a4a;
    --text-light: #7a8a7a;
    --month-bg: #e8efe0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--warm-white);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green-dark);
    padding: 28px 20px 22px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 1.6rem;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }

  header p {
    color: var(--green-light);
    font-size: 0.78rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* MONAT NAVIGATION */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-top: 12px;
  }

  .month-nav-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.18s;
    flex-shrink: 0;
  }

  .month-nav-btn:active {
    background: rgba(255,255,255,0.25);
  }

  .month-nav-btn svg {
    width: 16px;
    height: 16px;
    stroke: white;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .month-nav-label {
    min-width: 120px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 500;
    color: white;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .today-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green-light);
    vertical-align: middle;
    margin-left: 5px;
    margin-bottom: 2px;
  }

  /* PFLANZENKARTEN GRID */
  .plant-grid {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* EINZELNE KARTE */
  .plant-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(45,74,45,0.08);
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* FOTO + NAME BEREICH */
  .card-top {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  .plant-photo {
    width: 110px;
    min-height: 110px;
    flex-shrink: 0;
    background: var(--month-bg);
    border-radius: 16px 0 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    position: relative;
    overflow: hidden;
  }

  .plant-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .plant-photo .emoji-placeholder {
    font-size: 3rem;
    opacity: 0.4;
  }

  .card-info {
    flex: 1;
    padding: 14px 14px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .plant-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--green-dark);
    line-height: 1.25;
    margin-bottom: 2px;
  }

  .plant-latin {
    font-size: 0.72rem;
    color: var(--text-light);
    font-style: italic;
    margin-bottom: 10px;
  }

  /* BADGES */
  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 9px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 500;
    line-height: 1;
  }

  .badge-bloom {
    background: #fef0e8;
    color: var(--bloom);
    border: 1px solid #f8d4b8;
  }

  .badge-bloom::before {
    content: '';
    display: inline-block;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 1.5px solid var(--bloom);
    margin-right: 4px;
    flex-shrink: 0;
  }

  .badge-cut {
    background: #e8f0e8;
    color: var(--green-mid);
    border: 1px solid #c4dcc4;
  }

  .badge svg {
    width: 11px;
    height: 11px;
    fill: currentColor;
  }

  /* MONATSSTREIFEN */
  .month-strip {
    padding: 10px 14px 16px;
    border-top: 1px solid #f0ece4;
    overflow: visible;
    display: flex;
    gap: 4px;
    align-items: center;
    background: var(--warm-white);
    container-type: inline-size;
    container-name: month-strip;
  }

  .month-label {
    display: none;
  }

  .month-dot {
    flex: 1;
    min-width: 0;
    max-width: 22px;
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.58rem;
    font-weight: 600;
    color: var(--text-light);
    background: transparent;
  }

  .month-strip {
    justify-content: space-between;
  }

  @container month-strip (min-width: 380px) {
    .month-strip {
      gap: 6px;
    }
  }

  @container month-strip (min-width: 570px) {
    .month-dot {
      max-width: unset;
      aspect-ratio: unset;
      height: 22px;
      border-radius: 6px;
      font-size: 0;
    }
    .month-dot::before {
      content: attr(data-short);
      font-size: 0.6rem;
    }
  }

  @container month-strip (min-width: 700px) {
    .month-strip {
      gap: 6px;
    }
    .month-dot {
      max-width: unset;
      aspect-ratio: unset;
      height: 22px;
      border-radius: 6px;
      font-size: 0;
    }
    .month-dot::before {
      content: attr(data-full);
      font-size: 0.58rem;
    }
  }

  .month-dot.cut-month {
    background: var(--green-mid);
    color: white;
  }

  .month-dot.bloom-month {
    background: #fef0e8;
    color: var(--bloom);
    border: 1px solid #f8d4b8;
  }

  .month-dot.cut-month.bloom-month {
    background: var(--green-mid);
    color: white;
    border: 2px solid var(--bloom);
  }

  .month-dot.current {
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .month-strip {
    position: relative;
  }

  .month-current-indicator {
    position: absolute;
    bottom: 5px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--green-light);
    transform: translateX(-50%);
    pointer-events: none;
  }

  /* DETAIL-BEREICH (eingeklappt) */
  .card-detail {
    padding: 0 14px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.2s ease;
  }

  .card-detail.open {
    max-height: 1200px;
    padding: 12px 14px 16px;
  }

  .detail-toggle {
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid #f0ece4;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--green-mid);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .detail-toggle svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    transition: transform 0.25s ease;
  }

  .detail-toggle.open svg {
    transform: rotate(180deg);
  }

  /* SCHNITTARTEN */
  .schnitt-type {
    margin-bottom: 12px;
  }

  .schnitt-type:last-child { margin-bottom: 0; }

  .schnitt-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .schnitt-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-erhaltung { background: var(--green-mid); }
  .dot-erziehung { background: var(--terra); }
  .dot-verjuengung { background: #9b6b9b; }

  .schnitt-desc {
    font-size: 0.78rem;
    color: var(--text-mid);
    line-height: 1.55;
    padding-left: 13px;
    border-left: 2px solid #e8ece4;
  }

  .schnitt-months {
    margin-top: 5px;
    padding-left: 13px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .schnitt-month-pill {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .pill-erhaltung { background: #e8f0e8; color: var(--green-mid); }
  .pill-erziehung { background: #fef0e8; color: var(--terra); }
  .pill-verjuengung { background: #f4eef4; color: #9b6b9b; }

  .schnitt-skizze {
    display: block;
    margin: 8px 0 6px 13px;
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid #e8ece4;
  }

  /* HINWEIS */
  .hint {
    text-align: center;
    padding: 8px 20px 32px;
    font-size: 0.72rem;
    color: var(--text-light);
    font-style: italic;
  }

  /* CURRENTLY ACTIVE HIGHLIGHT */
  .plant-card.active-now {
    box-shadow: 0 2px 8px rgba(45,74,45,0.08), 0 0 0 2px var(--green-light);
  }

  .active-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    text-align: center;
    background: var(--green-light);
    color: white;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 5px;
  }
</style>
</head>
<body>

<header>
  <h1>Schnittkalender</h1>
  <p>Mein Garten</p>
  <div class="month-nav">
    <button class="month-nav-btn" id="btn-prev" aria-label="Vorheriger Monat">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="month-nav-label" id="month-label">Mai</div>
    <button class="month-nav-btn" id="btn-next" aria-label="Nächster Monat">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</header>

<div class="plant-grid" id="plant-grid"></div>

<script>
  const MONATE      = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const MONATE_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const MONATE_LETTER = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const heute = new Date();
  let aktiverMonat = heute.getMonth();

  function formatMonthRange(months) {
    if (!months || months.length === 0) return '–';
    const names = months.map(m => MONATE_SHORT[m]);
    if (months.length === 1) return names[0];
    // check if consecutive
    let consecutive = true;
    for (let i = 1; i < months.length; i++) {
      if (months[i] !== months[i-1] + 1) { consecutive = false; break; }
    }
    if (consecutive && months.length > 2) return names[0] + ' – ' + names[names.length-1];
    return names.join(', ');
  }

  function buildCard(plant, index) {
    const cutSet  = new Set(plant.cut || []);
    const bloomSet = new Set(plant.bloom || []);

    // month strip
    const dots = MONATE.map((name, i) => {
      const classes = ['month-dot'];
      if (cutSet.has(i))   classes.push('cut-month');
      if (bloomSet.has(i)) classes.push('bloom-month');
      return `<div class="${classes.join(' ')}" data-short="${MONATE_SHORT[i]}" data-full="${name}">${MONATE_LETTER[i]}</div>`;
    }).join('');

    // schnitt detail sections — Erhaltung first, then Erziehung, then Verjüngung
    const schnittTypes = [
      { key: 'erhaltung', label: 'Erhaltungsschnitt', dotClass: 'dot-erhaltung', pillClass: 'pill-erhaltung' },
      { key: 'erziehung', label: 'Erziehungsschnitt', dotClass: 'dot-erziehung', pillClass: 'pill-erziehung' },
      { key: 'verjuengung', label: 'Verjüngungsschnitt', dotClass: 'dot-verjuengung', pillClass: 'pill-verjuengung' },
    ];

    const schnittHTML = schnittTypes.map(({ key, label, dotClass, pillClass }) => {
      const data = plant[key];
      if (!data) return '';
      const pills = (data.months || []).map(m => `<span class="schnitt-month-pill ${pillClass}">${MONATE[m]}</span>`).join('');
      const skizze = data.image ? `<img src="${data.image}" alt="Skizze" class="schnitt-skizze" loading="lazy">` : '';
      return `
        <div class="schnitt-type">
          <div class="schnitt-label"><span class="schnitt-dot ${dotClass}"></span>${label}</div>
          <div class="schnitt-desc">${data.description || ''}</div>
          ${skizze}
          <div class="schnitt-months">${pills}</div>
        </div>`;
    }).join('');

    // image or placeholder
    const photoContent = plant.image
      ? `<img src="${plant.image}" alt="${plant.name}" loading="lazy">`
      : `<span class="emoji-placeholder">🌿</span>`;

    return `
      <div class="plant-card" style="animation-delay:${index * 0.06}s" data-cut='${JSON.stringify(plant.cut || [])}'>
        <div class="card-top">
          <div class="plant-photo">
            ${photoContent}
            <div class="active-badge" style="display:none">Jetzt schneiden</div>
          </div>
          <div class="card-info">
            <div>
              <div class="plant-name">${plant.name}</div>
              <div class="plant-latin">${plant.latin || ''}</div>
            </div>
            <div class="badge-row">
              <span class="badge badge-bloom">Blüte: ${formatMonthRange(plant.bloom)}</span>
              <span class="badge badge-cut">✂ Schnitt: ${formatMonthRange(plant.cut)}</span>
            </div>
          </div>
        </div>
        <div class="month-strip">${dots}<div class="month-current-indicator"></div></div>
        <button class="detail-toggle">
          Schnittarten & Details
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="card-detail">${schnittHTML}</div>
      </div>`;
  }

  function updateMonatAnzeige() {
    const label = document.getElementById('month-label');
    const isHeute = aktiverMonat === heute.getMonth();
    label.innerHTML = MONATE[aktiverMonat] + (isHeute ? '<span class="today-dot"></span>' : '');
  }

  function updateKarten() {
    const cards = document.querySelectorAll('.plant-card');
    cards.forEach((card) => {
      const cutMonths = JSON.parse(card.dataset.cut || '[]');
      const istSchnittMonat = cutMonths.includes(aktiverMonat);

      const badge = card.querySelector('.active-badge');
      badge.style.display = istSchnittMonat ? 'block' : 'none';

      card.classList.toggle('active-now', istSchnittMonat);

      const dots = card.querySelectorAll('.month-strip .month-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('current', i === aktiverMonat);
      });

      // position the current month indicator dot
      const strip = card.querySelector('.month-strip');
      const indicator = strip.querySelector('.month-current-indicator');
      const activeDot = strip.querySelectorAll('.month-dot')[aktiverMonat];
      if (activeDot && indicator) {
        const dotRect = activeDot.getBoundingClientRect();
        const stripRect = strip.getBoundingClientRect();
        indicator.style.left = (dotRect.left - stripRect.left + dotRect.width / 2) + 'px';
      }

      card.dataset.sortKey = istSchnittMonat ? '0' : '1';
    });

    const grid = document.querySelector('.plant-grid');
    const sorted = Array.from(cards).sort((a, b) =>
      a.dataset.sortKey.localeCompare(b.dataset.sortKey)
    );
    sorted.forEach((card, i) => {
      card.style.animationDelay = (i * 0.06) + 's';
      grid.appendChild(card);
    });
  }

  function changeMonth(dir) {
    aktiverMonat = (aktiverMonat + dir + 12) % 12;
    updateMonatAnzeige();
    updateKarten();
  }

  document.getElementById('btn-prev').addEventListener('click', () => changeMonth(-1));
  document.getElementById('btn-next').addEventListener('click', () => changeMonth(1));
  window.addEventListener('resize', () => updateKarten());

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.detail-toggle');
    if (!btn) return;
    const detail = btn.nextElementSibling;
    const isOpen = detail.classList.contains('open');
    detail.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
  });

  // Load plants and render
  fetch('plants.json')
    .then(r => r.json())
    .then(plants => {
      const grid = document.getElementById('plant-grid');
      grid.innerHTML = plants.map((p, i) => buildCard(p, i)).join('');
      updateMonatAnzeige();
      updateKarten();
    });
</script>
</body>
</html>
